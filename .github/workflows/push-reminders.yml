name: Send reminder push notifications

# Drives the closed-app reminder sender. GitHub's minimum schedule is every
# 5 minutes; the /api/cron/push-due endpoint dedupes per local day and has a
# catch-up window, so occasional scheduler lag is fine.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL      e.g. https://your-project.lovable.app   (no trailing slash)
#   CRON_SECRET  the same value as the app's CRON_SECRET env var

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: push-reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push-due endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL and CRON_SECRET repo secrets must be set." >&2
            exit 1
          fi
          curl -fsS --max-time 60 -X POST "$APP_URL/api/cron/push-due" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
