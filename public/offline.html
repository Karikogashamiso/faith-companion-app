<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Faith Companion</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #171307;
        color: #ebe2cc;
        font-family: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 22rem; }
      .mark {
        width: 64px; height: 64px; margin: 0 auto 20px;
        border-radius: 16px; background: #e6c364;
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-family: Georgia, "Times New Roman", serif; font-size: 1.5rem; color: #e6c364; margin: 0 0 8px; }
      p { color: #d0c5b2; line-height: 1.6; margin: 0 0 20px; }
      button {
        height: 44px; padding: 0 20px; border: 0; border-radius: 10px;
        background: #e6c364; color: #3d2e00; font-weight: 700; font-size: 0.95rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="#3d2e00">
          <path d="M3 6c2.5-1 5-1 7 0v13c-2-1-4.5-1-7 0V6zm11 0c2-1 4.5-1 7 0v13c-2.5-1-5-1-7 0V6z" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Faith Companion needs a connection for this page. Your reading, prayers,
        and progress are safe — they'll sync when you're back online.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
